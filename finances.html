<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./font-awesome.min.css"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Expenses - BizTrack</title>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span data-i18n="appName">BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" data-i18n-title="close" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="sidebar.products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="sidebar.orders">Orders</span>
                </a>
            </li>
            <li class="active">
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="sidebar.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="sidebar.help">Help</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="sidebar.about">Meet the Developer</span>
                </a>
            </li>
            <li>
                <a href="./privacy.html">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span data-i18n="sidebar.privacy">Privacy Policy</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-wrapper">
            <div class="menu-icon" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="header-title">
                <h2 data-i18n="header.expenses">Expenses</h2>
            </div>
            <div class="user-info">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" data-i18n="search" placeholder="Search">
                </div>
                <div class="language-switcher">
                    <a href="#" onclick="toggleLanguageDropdown(event); return false;">
                        <i class="fa-solid fa-language"></i>
                        <span data-i18n="language">English</span>
                        <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
                    </a>
                    <ul class="language-dropdown">
                        <li><a href="#" onclick="selectLanguage('en'); return false;">English</a></li>
                        <li><a href="#" onclick="selectLanguage('zh'); return false;">中文</a></li>
                        <li><a href="#" onclick="selectLanguage('zh-TW'); return false;">繁體中文</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="product-title">
                <h3 class="main-title" data-i18n="header.expenses">Expenses</h3>
                <div class="finance-button">
                    <button class="add-button" onclick="openForm()" data-i18n="addExpense">Add Expense</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="exportCSV">Export to CSV</button>
                </div>
            </div>

            <div class="form-popup">
                <form class="form-container" id="transaction-form" onsubmit="addOrUpdate(event)">
                    <div class="form-columns">
                            <input type="hidden" id="tr-id">
                            <label for="tr-date"><b data-i18n="date">Date</b>: </label>
                            <input type="date" id="tr-date" required>

                            <label for="tr-category"><b data-i18n="category">Category</b>: </label>
                            <select name="tr-category" id="tr-category" required>
                                <option value="" disabled selected hidden data-i18n="chooseExpenseCategory">Choose an expense category</option>
                                <option value="Rent" data-i18n="data.Rent">Rent</option>
                                <option value="Utilities" data-i18n="data.Utilities">Utilities</option>
                                <option value="Supplies" data-i18n="data.Supplies">Supplies</option>
                                <option value="Order Fulfillment" data-i18n="data.Order Fulfillment">Order Fulfillment</option>
                                <option value="Miscellaneous" data-i18n="data.Miscellaneous">Miscellaneous</option>
                            </select>

                            <label for="tr-amount"><b data-i18n="amount">Amount</b>: </label>
                            <input type="number" id="tr-amount" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="tr-notes"><b data-i18n="notes">Notes</b>: </label>
                            <input type="text" id="tr-notes" placeholder="Power bill" required>
                    </div>

                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="add">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="cancel">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="finance-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('trID')" data-i18n="sn">S/N</th>
                            <th onclick="sortTable('trDate')" data-i18n="date">Date</th>
                            <th onclick="sortTable('trCategory')" data-i18n="category">Expense Category</th>
                            <th onclick="sortTable('trAmount')" data-i18n="amount">Amount</th>
                            <th onclick="sortTable('trNotes')" data-i18n="notes">Notes</th>
                            <th data-i18n="action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="6">
                                <div id="total-expenses"></div>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>
    </div>

    <script defer src="./finances.js"></script>
    <script defer src="cookie-banner.js"></script>
    <script defer src="./i18n.js"></script>
</body>
</html>
