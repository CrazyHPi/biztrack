<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:title" content="BizTrack Project by Sumayyah" />
    <meta
      property="og:description"
      content="A project born out of real small business challenges, now simplifying product, order, and finance management."
    />
    <meta
      property="og:image:secure_url"
      content="https://i.imgur.com/0O47fVi.jpg"
    />
    <meta property="og:url" content="https://sumusa.github.io/biztrack/" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico" />
    <title>Orders - BizTrack</title>
  </head>
  <body>
    <div id="sidebar" class="sidebar">
      <div class="logo">
        <a href="./index.html">
          <i class="fas fa-b"></i>
          <span data-i18n="appName">BizTrack</span>
        </a>
        <i
          class="fa-solid fa-xmark"
          data-i18n-title="close"
          title="Close"
          onclick="closeSidebar()"
        ></i>
      </div>
      <ul class="menu">
        <li>
          <a href="./index.html">
            <i class="fa-solid fa-gauge-high"></i>
            <span data-i18n="sidebar.dashboard">Dashboard</span>
          </a>
        </li>
        <li>
          <a href="./products.html">
            <i class="fas fa-dolly"></i>
            <span data-i18n="sidebar.products">Products</span>
          </a>
        </li>
        <li class="active">
          <a href="./orders.html">
            <i class="fas fa-shopping-cart"></i>
            <span data-i18n="sidebar.orders">Orders</span>
          </a>
        </li>
        <li>
          <a href="./finances.html">
            <i class="fas fa-sack-dollar"></i>
            <span data-i18n="sidebar.expenses">Expenses</span>
          </a>
        </li>
        <li>
          <a href="./help.html">
            <i class="fas fa-question-circle"></i>
            <span data-i18n="sidebar.help">Help</span>
          </a>
        </li>
        <li class="logout">
          <a href="./about.html">
            <i class="fa-solid fa-users-line"></i>
            <span data-i18n="sidebar.about">Meet the Developer</span>
          </a>
        </li>
      </ul>
      <div class="lang-switch-wrapper" style="margin-top: auto; padding: 15px">
        <button
          id="lang-switch"
          data-i18n="language"
          style="
            background: #247ba0;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
          "
        >
          中文
        </button>
      </div>
    </div>

    <div class="main-content">
      <div class="header-wrapper">
        <div class="menu-icon" onclick="openSidebar()">
          <i class="fa-solid fa-bars"></i>
        </div>
        <div class="header-title">
          <h2 data-i18n="header.orders">Orders</h2>
        </div>
        <div class="user-info">
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input
              type="search"
              id="searchInput"
              data-i18n-placeholder="search"
              placeholder="Search"
            />
          </div>
        </div>
      </div>

      <div class="table-wrapper">
        <div class="product-title">
          <h3 class="main-title" data-i18n="sidebar.orders">Orders</h3>
          <div class="order-button">
            <button
              class="add-button"
              onclick="openForm()"
              data-i18n="addOrder"
            >
              Add Order
            </button>
            <button
              class="download-button"
              onclick="exportToCSV()"
              data-i18n="exportCSV"
            >
              Export to CSV
            </button>
          </div>
        </div>

        <div class="form-popup">
          <form
            class="form-container"
            id="order-form"
            onsubmit="addOrUpdate(event)"
          >
            <div class="form-columns">
              <div class="order-first-col">
                <label for="order-id"
                  ><b data-i18n="orderID">Order ID: </b></label
                >
                <input
                  type="text"
                  id="order-id"
                  data-i18n-placeholder="orderIDPlaceholder"
                  placeholder="1001"
                  required
                />

                <label for="order-date"
                  ><b data-i18n="orderDateLabel">Order Date: </b></label
                >
                <input type="date" id="order-date" required />

                <label for="item-name"
                  ><b data-i18n="itemNameLabel">Item Name: </b></label
                >
                <select name="item-name" id="item-name" required>
                  <option
                    value=""
                    disabled
                    selected
                    hidden
                    data-i18n="chooseItem"
                  >
                    Choose an item
                  </option>
                  <optgroup label="Hats">
                    <option value="Baseball caps">Baseball caps</option>
                    <option value="Snapbacks">Snapbacks</option>
                    <option value="Beanies">Beanies</option>
                    <option value="Bucket hats">Bucket hats</option>
                  </optgroup>
                  <optgroup label="Drinkware">
                    <option value="Mugs">Mugs</option>
                    <option value="Water bottles">Water bottles</option>
                    <option value="Tumblers">Tumblers</option>
                  </optgroup>
                  <optgroup label="Clothing">
                    <option value="T-shirts">T-shirts</option>
                    <option value="Sweatshirts">Sweatshirts</option>
                    <option value="Hoodies">Hoodies</option>
                  </optgroup>
                  <optgroup label="Accessories">
                    <option value="Pillow cases">Pillow cases</option>
                    <option value="Tote bags">Tote bags</option>
                    <option value="Stickers">Stickers</option>
                  </optgroup>
                  <optgroup label="Home decor">
                    <option value="Posters">Posters</option>
                    <option value="Framed posters">Framed posters</option>
                    <option value="Canvas prints">Canvas prints</option>
                  </optgroup>
                </select>
              </div>

              <div class="order-second-col">
                <label for="item-price"
                  ><b data-i18n="itemPriceLabel">Item Price:</b></label
                >
                <input
                  type="number"
                  id="item-price"
                  placeholder="$0.00"
                  min="0.00"
                  max="10000.00"
                  step="0.01"
                  required
                />

                <label for="qty-bought"
                  ><b data-i18n="qtyBoughtLabel">Quantity Bought:</b></label
                >
                <input type="number" id="qty-bought" placeholder="1" required />

                <label for="shipping"
                  ><b data-i18n="shippingLabel">Shipping fee:</b></label
                >
                <input
                  type="number"
                  id="shipping"
                  placeholder="$2.00"
                  min="0.00"
                  max="10000.00"
                  step="0.01"
                  required
                />
              </div>

              <div class="order-third-col">
                <label for="taxes"
                  ><b data-i18n="taxesLabel">Taxes (VAT/GST/HST):</b></label
                >
                <input
                  type="number"
                  id="taxes"
                  placeholder="$2.00"
                  min="0.00"
                  max="10000.00"
                  step="0.01"
                  required
                />

                <label for="order-status"
                  ><b data-i18n="orderStatusLabel">Order Status:</b></label
                >
                <select name="order-status" id="order-status" required>
                  <option
                    value=""
                    disabled
                    selected
                    hidden
                    data-i18n="chooseStatus"
                  >
                    Choose a status
                  </option>
                  <option value="Pending" class="pending" data-i18n="pending">
                    Pending
                  </option>
                  <option
                    value="Processing"
                    class="processing"
                    data-i18n="processing"
                  >
                    Processing
                  </option>
                  <option value="Shipped" class="shipped" data-i18n="shipped">
                    Shipped
                  </option>
                  <option
                    value="Delivered"
                    class="delivered"
                    data-i18n="delivered"
                  >
                    Delivered
                  </option>
                </select>

                <label for="order-total"
                  ><b data-i18n="totalOrderAmount"
                    >Total Order Amount: (Calculated)</b
                  ></label
                >
                <input
                  type="number"
                  id="order-total"
                  placeholder="$0.00"
                  min="0.00"
                  max="10000.00"
                  step="0.01"
                  disabled
                />
              </div>
            </div>

            <div class="button-col">
              <button type="submit" class="btn" id="submitBtn" data-i18n="add">
                Add
              </button>
              <button
                type="button"
                class="btn cancel"
                onclick="closeForm()"
                data-i18n="cancel"
              >
                Cancel
              </button>
            </div>
          </form>
        </div>

        <div class="table-container">
          <table id="order-table">
            <thead>
              <tr>
                <th onclick="sortTable('orderID')" data-i18n="orderID">
                  Order ID
                </th>
                <th onclick="sortTable('orderDate')" data-i18n="orderDate">
                  Order Date
                </th>
                <th onclick="sortTable('itemName')" data-i18n="itemName">
                  Item Name
                </th>
                <th onclick="sortTable('itemPrice')" data-i18n="itemPrice">
                  Item Price
                </th>
                <th onclick="sortTable('qtyBought')" data-i18n="qty">Qty</th>
                <th onclick="sortTable('shipping')" data-i18n="shippingFee">
                  Shipping Fee
                </th>
                <th onclick="sortTable('taxes')" data-i18n="taxes">Taxes</th>
                <th onclick="sortTable('orderTotal')" data-i18n="orderTotal">
                  Order Total
                </th>
                <th onclick="sortTable('orderStatus')" data-i18n="orderStatus">
                  Order Status
                </th>
                <th data-i18n="action">Action</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
            <tfoot>
              <tr>
                <td colspan="10">
                  <div id="total-revenue"></div>
                </td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    </div>

    <script src="./i18n.js"></script>
    <script src="./orders.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        await i18n.init();
      });
      document.addEventListener("click", (e) => {
        if (e.target && e.target.id === "lang-switch") i18n.switchLang();
      });
    </script>
  </body>
</html>
