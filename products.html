<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width", initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="stylesheet" href="./styles.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Products - BizTrack</title>
    <script src="./i18n.js"></script>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span data-i18n="appName">BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" data-i18n-title="close" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li>
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>
            </li>
            <li class="active">
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="sidebar.products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="sidebar.orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="sidebar.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="sidebar.help">Help</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="sidebar.about">Meet the Developer</span>
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header-wrapper">
            <div class="menu-icon" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="header-title">
                <h2 data-i18n="header.products">Products</h2>
            </div>
            <div class="user-info">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="search" id="searchInput" data-i18n="search" placeholder="Search">
                </div>
                <div class="language-switcher">
                    <a href="#" onclick="toggleLanguageDropdown(event); return false;">
                        <i class="fa-solid fa-language"></i>
                        <span data-i18n="language">English</span>
                        <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
                    </a>
                    <ul class="language-dropdown">
                        <li><a href="#" onclick="selectLanguage('en'); return false;">English</a></li>
                        <li><a href="#" onclick="selectLanguage('zh'); return false;">中文</a></li>
                        <li><a href="#" onclick="selectLanguage('zh-TW'); return false;">繁體中文</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <div class="product-title">
                <h3 class="main-title" data-i18n="header.products">Products</h3>
                <div class="product-button">
                    <button class="add-button" onclick="openForm()" data-i18n="addProduct">Add Product</button>
                    <button class="download-button" onclick="exportToCSV()" data-i18n="downloadCSV">Download CSV</button>
                </div>
            </div>
            <div class="form-popup">
                <form class="form-container" id="product-form" onsubmit="addOrUpdate(event)">
                    <div class="form-columns">
                        <div class="first-col">
                            <label for="product-id"><b data-i18n="productID">Product ID</b>: </label>
                            <input type="text" id="product-id" placeholder="PD001" required>

                            <label for="product-name"><b data-i18n="productName">Product Name</b></label>
                            <select name="product-name" id="product-name" required>
                                <option value="" disabled selected hidden data-i18n="chooseItem">Choose a product</option>
                                <optgroup label="Hats" data-i18n="data.Hats">
                                    <option value="Baseball caps" data-i18n="data.Baseball caps">Baseball caps</option>
                                    <option value="Snapbacks" data-i18n="data.Snapbacks">Snapbacks</option>
                                    <option value="Beanies" data-i18n="data.Beanies">Beanies</option>
                                    <option value="Bucket hats" data-i18n="data.Bucket hats">Bucket hats</option>
                                </optgroup>
                                <optgroup label="Drinkware" data-i18n="data.Drinkware">
                                    <option value="Mugs" data-i18n="data.Mugs">Mugs</option>
                                    <option value="Water bottles" data-i18n="data.Water bottles">Water bottles</option>
                                    <option value="Tumblers" data-i18n="data.Tumblers">Tumblers</option>
                                </optgroup>
                                <optgroup label="Clothing" data-i18n="data.Clothing">
                                    <option value="T-shirts" data-i18n="data.T-shirts">T-shirts</option>
                                    <option value="Sweatshirts" data-i18n="data.Sweatshirts">Sweatshirts</option>
                                    <option value="Hoodies" data-i18n="data.Hoodies">Hoodies</option>
                                </optgroup>
                                <optgroup label="Accessories" data-i18n="data.Accessories">
                                    <option value="Pillow cases" data-i18n="data.Pillow cases">Pillow cases</option>
                                    <option value="Tote bags" data-i18n="data.Tote bags">Tote bags</option>
                                    <option value="Stickers" data-i18n="data.Stickers">Stickers</option>
                                </optgroup>
                                <optgroup label="Home decor" data-i18n="data.Home decor">
                                    <option value="Posters" data-i18n="data.Posters">Posters</option>
                                    <option value="Framed posters" data-i18n="data.Framed posters">Framed posters</option>
                                    <option value="Canvas prints" data-i18n="data.Canvas prints">Canvas prints</option>
                                </optgroup>
                            </select>

                            <label for="product-desc"><b data-i18n="description">Product Description</b>:</label>
                            <input type="text" id="product-desc" placeholder="Travel Mug" required>
                        </div>
                        <div class="second-col">
                            <label for="product-cat"><b data-i18n="productCategory">Product Category</b>:</label>
                            <select name="product-cat" id="product-cat" required>
                                <option value="" disabled selected data-i18n="chooseCategory">Choose a category</option>
                                <option value="Clothing" data-i18n="data.Clothing">Clothing</option>
                                <option value="Drinkware" data-i18n="data.Drinkware">Drinkware</option>
                                <option value="Accessories" data-i18n="data.Accessories">Accessories</option>
                                <option value="Hats" data-i18n="data.Hats">Hats</option>
                                <option value="Home decor" data-i18n="data.Home decor">Home decor</option>
                            </select>

                            <label for="product-price"><b data-i18n="price">Product Price</b>:</label>
                            <input type="number" id="product-price" placeholder="$0.00" min="0.00" max="10000.00" step="0.01" required>

                            <label for="product-sold"><b data-i18n="unitsSold">Number of Units Sold</b>:</label>
                            <input type="number" id="product-sold" placeholder="10" min="0" step="1" required>
                        </div>
                    </div>

                    <div class="button-col">
                        <button type="submit" class="btn" id="submitBtn" data-i18n="add">Add</button>
                        <button type="button" class="btn cancel" onclick="closeForm()" data-i18n="cancel">Cancel</button>
                    </div>
                </form>
            </div>
            <div class="table-container">
                <table id="product-table">
                    <thead>
                        <tr>
                            <th onclick="sortTable('prodID')" data-i18n="productID">Product ID</th>
                            <th onclick="sortTable('prodName')" data-i18n="productName">Product Name</th>
                            <th onclick="sortTable('prodDesc')" data-i18n="description">Description</th>
                            <th onclick="sortTable('prodCat')" data-i18n="productCategory">Category</th>
                            <th onclick="sortTable('prodPrice')" data-i18n="price">Price</th>
                            <th onclick="sortTable('prodSold')" data-i18n="unitsSold">Units Sold</th>
                            <th data-i18n="action">Action</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    </div>

    <script src="./products.js"></script>
    <script src="cookie-banner.js"></script>
</body>
</html>
