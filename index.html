<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BizTrack Project by Sumayyah"/>
    <meta property="og:description" content="A project born out of real small business challenges, now simplifying product, order, and finance management."/>
    <meta property="og:image:secure_url" content="https://i.imgur.com/0O47fVi.jpg"/>
    <meta property="og:url" content="https://sumusa.github.io/biztrack/"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="font-awesome.min.css"/>
    <link rel="stylesheet" href="styles.css"/>
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <title>Dashboard - BizTrack</title>
</head>
<body>
    <div id="sidebar" class="sidebar">
        <div class="logo">
            <a href="./index.html">
                <i class="fas fa-b"></i>
                <span data-i18n="appName">BizTrack</span>
            </a>
            <i class="fa-solid fa-xmark" data-i18n-title="close" title="Close" onclick="closeSidebar()"></i>
        </div>
        <ul class="menu">
            <li class="active">
                <a href="./index.html">
                    <i class="fa-solid fa-gauge-high"></i>
                    <span data-i18n="sidebar.dashboard">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="./products.html">
                    <i class="fas fa-dolly"></i>
                    <span data-i18n="sidebar.products">Products</span>
                </a>
            </li>
            <li>
                <a href="./orders.html">
                    <i class="fas fa-shopping-cart"></i>
                    <span data-i18n="sidebar.orders">Orders</span>
                </a>
            </li>
            <li>
                <a href="./finances.html">
                    <i class="fas fa-sack-dollar"></i>
                    <span data-i18n="sidebar.expenses">Expenses</span>
                </a>
            </li>
            <li>
                <a href="./help.html">
                    <i class="fas fa-question-circle"></i>
                    <span data-i18n="sidebar.help">Help</span>
                </a>
            </li>
            <li class="logout">
                <a href="./about.html">
                    <i class="fa-solid fa-users-line"></i>
                    <span data-i18n="sidebar.about">Meet the Developer</span>
                </a>
            </li>
            <li>
                <a href="./privacy.html">
                    <i class="fa-solid fa-shield-halved"></i>
                    <span data-i18n="sidebar.privacy">Privacy Policy</span>
                </a>
            </li>
        </ul>
    </div>

    <main class="main-content">
        <div class="header-wrapper">
            <div class="menu-icon" onclick="openSidebar()">
                <i class="fa-solid fa-bars"></i>
            </div>
            <div class="header-title">
                <h2 data-i18n="header.dashboard">Dashboard</h2>
            </div>
            <div class="user-info">
                <div class="language-switcher">
                    <a href="#" onclick="toggleLanguageDropdown(event); return false;">
                        <i class="fa-solid fa-language"></i>
                        <span data-i18n="language">English</span>
                        <i class="fa-solid fa-chevron-down dropdown-arrow"></i>
                    </a>
                    <ul class="language-dropdown">
                        <li><a href="#" onclick="selectLanguage('en'); return false;">English</a></li>
                        <li><a href="#" onclick="selectLanguage('zh'); return false;">中文</a></li>
                        <li><a href="#" onclick="selectLanguage('zh-TW'); return false;">繁體中文</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <div class="card-container">
            <h3 class="main-title" data-i18n="summary">Summary</h3>
            <div class="card-wrapper">
                <a href="./orders.html">
                    <div class="payment-card">
                        <div class="card-header">
                            <div class="amount" id="rev-amount">
                            </div>
                            <i class="fas fa-sack-dollar icon"></i>
                        </div>
                        <span class="card-detail">**** **** **** 5674</span>
                    </div>
                </a>
                <a href="./finances.html">
                    <div class="payment-card">
                        <div class="card-header">
                            <div class="amount" id="exp-amount"></div>
                            <i class="fas fa-credit-card icon"></i>
                        </div>
                        <span class="card-detail">**** **** **** 2356</span>
                    </div>
                </a>
                <a href="./orders.html">
                    <div class="payment-card">
                        <div class="card-header">
                            <div class="amount" id="num-orders"></div>
                            <i class="fas fa-shopping-cart icon"></i>
                        </div>
                        <span class="card-detail">**** **** **** 1047</span>
                    </div>
                </a>
                <a href="#">
                    <div class="payment-card">
                        <div class="card-header">
                            <div class="amount" id="balance"></div>
                            <i class="fas fa-arrow-up-right-dots icon"></i>
                        </div>
                        <span class="card-detail">**** **** **** 2951</span>
                    </div>
                </a>
            </div>
        </div>
        <div class="charts-container">
            <h3 class="main-title" data-i18n="analytics">Analytics</h3>
            <div class="charts-wrapper">
                <div class="charts-card">
                    <span class="chart-title" data-i18n="sales.byCategory">Sales by Product Category</span>
                    <div id="bar-chart"></div>
                </div>
                <div class="charts-card">
                    <span class="chart-title" data-i18n="expenses.category">Expenses</span>
                    <div id="donut-chart"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Apex Charts -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.45.2/apexcharts.min.js"></script>
    <script defer src="./script.js"></script>
    <script>initializeChart()</script>
    <script defer src="cookie-banner.js"></script>
    <script defer src="./i18n.js"></script>
</body>
</html>
